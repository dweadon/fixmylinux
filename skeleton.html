<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/imresizer-linux-from-scratch-83.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    
    .header {
      background-color: blanchedalmond;
      display: flex;
      align-items: center;
      padding: 10px;
    }
    .header img {
      width: 80px;
    }

    .header h1 {
      color: darkred;
      margin: 0;
    }
    textarea{
      display: block;
      margin: 0 auto;
      cursor: pointer;
      border: 2px solid black;
      border-radius: 8px;
      
    }
        
    #answer {
      margin: 20px auto;
      width: 50%;
      font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif; /* change this */
      font-size: 18px;
      white-space: pre-wrap;
    }
    button {
      display: block;
      margin: 0 auto;
      color: black;
      font-size: 30px;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }
  .faq-link {
    position: fixed;
    bottom: 20px;
    left: 20px;
  }
  .feedback {
	position: fixed;
	bottom: 20px;
	left: 2350px;
}
  </style>
  <title>FixMyLinux</title>
</head>
<body>
<div class="header">
    <img src="/static/tuix.png" alt="tux">
    <h1>FixMyLinux</h1>
  </div>  
<a class="faq-link" href="https://fixmylinux.up.railway.app/faq" style="color: grey;">Check out our FAQ section</a>
<a class="feedback" href="https://fixmylinux.up.railway.app/feed" style="color: grey;">Have an idea or feedback?</a>
<form id="feed" action="https://fixmylinux.up.railway.app/feed" method="POST">
  <textarea id="feedback" name="feedback" placeholder="Write your feedback here..."></textarea> 
  <button type="button" onclick="sendFeedback(event)">Send</button>
  <div id="feedresult"></div>
</form>
<form id="askform" action="https://fixmylinux.up.railway.app/ask" method="POST">
  <textarea id="problem" name="problem" placeholder="Paste your Linux problem here..."></textarea>
  <button type="button" onclick="askAI(event)">Fix it!</button>
  <div id="answer"></div>
</form>

<script>

  async function askAI(event) {
    event.preventDefault()
    const problem = document.getElementById("problem").value

    const response = await fetch("/ask", {
      method: "POST",
      body: new FormData(document.getElementById("askform"))
    })
    const answer = await response.text()
    document.getElementById("answer").innerHTML = answer
 
 }
   async function sendFeedback(event) {
    event.preventDefault()
    const response = await fetch("/feed", {
        method: "POST",
        body: new FormData(document.getElementById("feed"))
    })
    const result = await response.text()
    document.getElementById("feedresult").innerHTML = result
}
</script>
</body>
</html>
