<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/imresizer-linux-from-scratch-83.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Feedback - FixMyLinux</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, sans-serif;
            background: #121212;
            color: #ffffff;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 40px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a2a2a;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .content-card {
            background: #181818;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 24px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        p {
            color: #b3b3b3;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 180px;

            background: #111111;
            color: white;

            border: 1px solid #2d2d2d;
            border-radius: 10px;

            padding: 14px;

            resize: vertical;

            font-size: 15px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #444;
        }

        textarea::placeholder {
            color: #888;
        }

        button {
            margin-top: 16px;

            background: #1DB954;
            color: black;

            border: none;
            border-radius: 8px;

            padding: 12px 24px;

            font-size: 15px;
            font-weight: 600;

            cursor: pointer;

            transition: filter .15s ease;
        }

        button:hover {
            filter: brightness(1.08);
        }

        #feedresult {
            margin-top: 18px;
            color: #1DB954;
            font-weight: 500;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;

            color: #b3b3b3;
            text-decoration: none;
        }

        .back-link:hover {
            color: white;
        }

@media (max-width: 768px) {

    body {
        padding: 20px 15px;
    }

    .header h1 {
        text-align: center;
    }

    .content-card {
        padding: 16px;
    }

    textarea {
        min-height: 150px;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 14px;
    }

    .back-link {
        display: block;
        text-align: center;
    }
}

    </style>
</head>
<body>

    <div class="header">
        <h1>🐧 FixMyLinux</h1>
    </div>

    <div class="content-card">

        <h2>Feedback</h2>

        <p>
            Have an idea, found a bug, or want to suggest an improvement?
            We'd love to hear from you.
        </p>

        <form id="feedform">

            <textarea
                id="feedback"
                name="feedback"
                placeholder="Write your feedback here..."
            ></textarea>

            <button type="button" onclick="sendFeedback(event)">
                Send Feedback
            </button>

            <div id="feedresult"></div>

        </form>

    </div>

    <a class="back-link" href="/">
        ← Back to home
    </a>

    <script>
        async function sendFeedback(event) {
            event.preventDefault();

            const response = await fetch("/feed", {
                method: "POST",
                body: new FormData(document.getElementById("feedform"))
            });

            const result = await response.text();
            document.getElementById("feedresult").innerHTML = result;
        }
    </script>

</body>
</html>
