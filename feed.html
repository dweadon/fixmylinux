<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/imresizer-linux-from-scratch-83.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Roboto, sans-serif;
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background-color: blanchedalmond;
      display: flex;
      align-items: center;
      padding: 10px;
    }
    .header h1 {
      color: darkred;
      margin: 0;
    }
    textarea {
      display: block;
      margin: 10px auto;
      border: 2px solid black;
      border-radius: 8px;
      width: 100%;
      padding: 10px;
    }
    button {
      display: block;
      margin: 10px auto;
      color: black;
      font-size: 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
    }
    #feedresult {
      margin-top: 20px;
      font-size: 18px;
      color: darkgreen;
    }
    a {
      color: grey;
    }
  </style>
  <title>Feedback - FixMyLinux</title>
</head>
<body>
  <div class="header">
    <h1>FixMyLinux - Feedback</h1>
  </div>
  <h2>Have an idea or feedback?</h2>
  <p>We'd love to hear from you!</p>
  <form id="feedform">
    <textarea id="feedback" name="feedback" rows="6" placeholder="Write your feedback here..."></textarea>
    <button type="button" onclick="sendFeedback(event)">Send</button>
    <div id="feedresult"></div>
  </form>
  <br>
  <a href="/">← Back to home</a>
  <script>
    async function sendFeedback(event) {
      event.preventDefault()
      const response = await fetch("/feed", {
        method: "POST",
        body: new FormData(document.getElementById("feedform"))
      })
      const result = await response.text()
      document.getElementById("feedresult").innerHTML = result
    }
  </script>
</body>
</html>
